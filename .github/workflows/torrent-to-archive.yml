name: Torrent to Archive.org

on:
  workflow_dispatch:
    inputs:
      torrent_url:
        description: 'URL of .torrent file to download'
        required: true
        default: 'https://www.retro-exo.com/eXoDOS.torrent'
      ia_identifier:
        description: 'Internet Archive item identifier'
        required: true
        default: 'exodos-full'
      start_file:
        description: 'Start file index (1-based)'
        required: true
        default: '1'
      end_file:
        description: 'End file index (1-based, 0=all files)'
        required: true
        default: '0'

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Free disk space
        run: df -h /

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 bc
          pip install internetarchive

      - name: Configure Internet Archive
        run: |
          mkdir -p ~/.config/internetarchive
          cat > ~/.config/internetarchive/ia.ini << 'EOCONF'
          [s3]
          access = ${{ secrets.IA_ACCESS }}
          secret = ${{ secrets.IA_SECRET }}
          EOCONF
          sed -i 's/^          //' ~/.config/internetarchive/ia.ini

      - name: Download torrent file
        run: |
          curl -sL -o torrent.torrent "${{ inputs.torrent_url }}"
          aria2c --show-files torrent.torrent 2>/dev/null | head -10

      - name: Download and upload files
        run: |
          echo "Starting upload process..."
          cat > /tmp/upload.sh << 'SCRIPT'
          #!/bin/bash
          START=$1
          END=$2
          IA_ID=$3

          echo "START=$START, END=$END, IA_ID=$IA_ID"
          TOTAL_FILES=$(aria2c --show-files torrent.torrent 2>/dev/null | grep -cE "^\s*[0-9]+\|" || echo 0)
          echo "Total files: $TOTAL_FILES"

          if [ "$END" -eq 0 ] || [ "$END" -gt "$TOTAL_FILES" ]; then
            END=$TOTAL_FILES
          fi

          aria2c --show-files torrent.torrent 2>/dev/null > /tmp/torrent_files.txt

          ia list "$IA_ID" 2>/dev/null | sort > /tmp/ia_files.txt || true
          echo "IA existing files: $(wc -l < /tmp/ia_files.txt)"

          for i in $(seq "$START" "$END"); do
            echo "Processing file $i"

            path=$(sed -n "/^\s*${i}|/p" /tmp/torrent_files.txt | sed "s/^\s*${i}|//" | sed 's/|.*//' | sed 's/^\.\///')
            echo "  Path: $path"

            if grep -qx "^${path}$" /tmp/ia_files.txt; then
              echo "  SKIP (exists)"
              continue
            fi

            mkdir -p workdir
            aria2c --dir=workdir --select-file="$i" --seed-time=0 --bt-stop-timeout=300 --bt-remove-unselected-file torrent.torrent 2>&1 | grep -v "^#"

            file=$(find workdir -type f ! -name "*.torrent" ! -name "*.aria2" | head -1)
            if [ -n "$file" ] && [ -f "$file" ]; then
              echo "  Uploading: $(basename "$file")"
              ia upload "$IA_ID" "$file" --remote-name="$path" --no-derive --retries=3
            fi

            rm -rf workdir
            echo "  Done"
          done

          echo "All done."
          SCRIPT
          chmod +x /tmp/upload.sh
          /tmp/upload.sh "${{ inputs.start_file }}" "${{ inputs.end_file }}" "${{ inputs.ia_identifier }}"
