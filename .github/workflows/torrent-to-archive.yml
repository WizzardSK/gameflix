name: Torrent to Archive.org

on:
  workflow_dispatch:
    inputs:
      torrent_url:
        description: 'URL of .torrent file to download'
        required: true
        default: 'https://www.retro-exo.com/eXoDOS.torrent'
      ia_identifier:
        description: 'Internet Archive item identifier'
        required: true
        default: 'exodos-full'
      start_file:
        description: 'Start file index (1-based)'
        required: true
        default: '1'
      end_file:
        description: 'End file index (1-based, 0=all files)'
        required: true
        default: '0'
      external_ia_id:
        description: 'External IA identifier to copy from (if name+size+date matches)'
        required: false
        default: 'exov5_2'
  schedule:
    - cron: '0 9,15,21,3 * * *'

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Free disk space
        run: df -h /

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 bc
          pip install internetarchive

      - name: Configure Internet Archive
        run: |
          mkdir -p ~/.config/internetarchive
          cat > ~/.config/internetarchive/ia.ini << 'EOCONF'
          [s3]
          access = ${{ secrets.IA_ACCESS }}
          secret = ${{ secrets.IA_SECRET }}
          EOCONF
          sed -i 's/^          //' ~/.config/internetarchive/ia.ini

      - name: Download torrent file
        run: |
          curl -sL -o torrent.torrent "${{ inputs.torrent_url }}"
          aria2c --show-files torrent.torrent 2>/dev/null | head -10

      - name: List existing IA files
        run: |
          ia list "${{ inputs.ia_identifier }}" 2>/dev/null | sort > /tmp/ia_files.txt || true
          echo "IA existing files: $(wc -l < /tmp/ia_files.txt)"

      - name: Download and upload files
        run: |
          echo "Starting upload process..."
          cat > /tmp/upload.sh << 'SCRIPT'
          #!/bin/bash
          START=$1
          END=$2
          IA_ID=$3
          EXTERNAL_IA=$4
          MAX_JOBS=5

          echo "START=$START, END=$END, IA_ID=$IA_ID, EXTERNAL=$EXTERNAL_IA"

          echo "Fetching external IA metadata..."
          curl -sL "https://archive.org/metadata/$EXTERNAL_IA?output=json" > /tmp/external_meta.json
          
          echo "Building external IA file index..."
          echo 'import json
          try:
              with open("/tmp/external_meta.json") as f:
                  data = json.load(f)
              for f in data.get("files", []):
                  name = f.get("name", "")
                  size = f.get("size", "")
                  mtime = f.get("mtime", "")
                  if name and size:
                      print(name + "\t" + size + "\t" + mtime)
          except: pass' > /tmp/build_index.py
          python3 /tmp/build_index.py > /tmp/external_files.txt
          echo "External IA files: $(wc -l < /tmp/external_files.txt)"

          TOTAL_FILES=$(aria2c --show-files torrent.torrent 2>/dev/null | grep -cE "^\s*[0-9]+\|" || echo 0)
          echo "Total files: $TOTAL_FILES"

          if [ "$END" -eq 0 ] || [ "$END" -gt "$TOTAL_FILES" ]; then
            END=$TOTAL_FILES
          fi

          aria2c --show-files torrent.torrent 2>/dev/null > /tmp/torrent_files.txt

          ia list "$IA_ID" 2>/dev/null | sort > /tmp/ia_files.txt || true
          echo "IA existing files: $(wc -l < /tmp/ia_files.txt)"

          process_file() {
            local i=$1
            local path size
            path=$(sed -n "/^\s*${i}|/p" /tmp/torrent_files.txt | sed "s/^\s*${i}|//" | sed 's/|.*//' | sed 's/^\.\///')
            size=$(sed -n "/^\s*${i}|/p" /tmp/torrent_files.txt | sed 's/.*|//' | tr -d ' ')

            if grep -qx "^${path}$" /tmp/ia_files.txt; then
              echo "File $i: SKIP (exists in target IA)"
              return
            fi

            ext_match=$(grep -F "${path}" /tmp/external_files.txt | grep -w "${size}")
            if [ -n "$ext_match" ]; then
              echo "File $i: Copying from external IA: $path"
              ia copy "$EXTERNAL_IA/${path}" "$IA_ID/${path}" --no-derive
              echo "File $i: Done (copied)"
              return
            fi

            mkdir -p "workdir_$i"
            aria2c --dir="workdir_$i" --select-file="$i" --seed-time=0 --bt-stop-timeout=300 --bt-remove-unselected-file torrent.torrent 2>&1 | grep -v "^#"

            file=$(find "workdir_$i" -type f ! -name "*.torrent" ! -name "*.aria2" | head -1)
            if [ -n "$file" ] && [ -f "$file" ]; then
              echo "File $i: Uploading $(basename "$file")"
              ia upload "$IA_ID" "$file" --remote-name="$path" --no-derive --retries=3
            fi

            rm -rf "workdir_$i"
            echo "File $i: Done"
          }

          for i in $(seq "$START" "$END"); do
            process_file "$i"
          done

          echo "All done."
          SCRIPT
          chmod +x /tmp/upload.sh
          /tmp/upload.sh "${{ inputs.start_file }}" "${{ inputs.end_file }}" "${{ inputs.ia_identifier }}" "${{ inputs.external_ia_id }}"
