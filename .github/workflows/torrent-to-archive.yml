name: Torrent to Archive.org

on:
  workflow_dispatch:
    inputs:
      torrent_url:
        description: 'URL of .torrent file to download'
        required: true
        default: 'https://www.retro-exo.com/eXoDOS.torrent'
      ia_identifier:
        description: 'Internet Archive item identifier'
        required: true
        default: 'exodos-full'
      start_file:
        description: 'Start file index (1-based)'
        required: true
        default: '1'
      end_file:
        description: 'End file index (1-based, 0=all files)'
        required: true
        default: '0'
      external_ia_ids:
        description: 'Comma-separated list of external IA identifiers to check (skip if file exists)'
        required: false
        default: 'exov5_2'
      copy_from_external:
        description: 'Copy files from external IA to target IA instead of downloading from torrent'
        required: false
        default: 'false'

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Free disk space
        run: df -h /

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 bc
          pip install internetarchive

      - name: Configure Internet Archive
        run: |
          mkdir -p ~/.config/internetarchive
          cat > ~/.config/internetarchive/ia.ini << 'EOCONF'
          [s3]
          access = ${{ secrets.IA_ACCESS }}
          secret = ${{ secrets.IA_SECRET }}
          EOCONF
          sed -i 's/^          //' ~/.config/internetarchive/ia.ini

      - name: Download torrent file
        run: |
          curl -sL -o torrent.torrent "${{ inputs.torrent_url }}"
          aria2c --quiet --show-files torrent.torrent 2>/dev/null | head -10

      - name: Download and upload files
        run: |
          echo "Starting upload process..."
          cat > /tmp/upload.sh << 'SCRIPT'
          #!/bin/bash
          START=$1
          END=$2
          IA_ID=$3
          COPY_MODE=$4
          EXTERNAL_IA_IDS=$5
          MAX_JOBS=5

          echo "START=$START, END=$END, IA_ID=$IA_ID, COPY_MODE=$COPY_MODE, EXTERNAL=$EXTERNAL_IA_IDS"

          ia list "$IA_ID" 2>/dev/null | sort > /tmp/ia_files.txt || true
          echo "IA existing files: $(wc -l < /tmp/ia_files.txt)"

          aria2c --quiet --show-files torrent.torrent 2>/dev/null | grep -E "^\s+[0-9]+\|" | sed 's/^[[:space:]]*[0-9]*|//' | sed 's|^\./||' > /tmp/torrent_files.txt
          TOTAL_FILES=$(wc -l < /tmp/torrent_files.txt)
          echo "Torrent files: $TOTAL_FILES"

          > /tmp/external_ia_files.txt
          for ext_id in $(echo "$EXTERNAL_IA_IDS" | tr ',' ' '); do
            echo "Fetching external IA file list: $ext_id"
            ia list "$ext_id" 2>/dev/null | sed 's|^eXo/eXoDOS/||' >> /tmp/external_ia_files.txt || true
          done
          sort -u /tmp/external_ia_files.txt > /tmp/external_ia_files_sorted.txt
          mv /tmp/external_ia_files_sorted.txt /tmp/external_ia_files.txt
          echo "External IA files: $(wc -l < /tmp/external_ia_files.txt)"

          if [ "$COPY_MODE" = "true" ]; then
            comm -12 <(sort /tmp/torrent_files.txt) <(sort /tmp/external_ia_files.txt) > /tmp/matching_files.txt
            echo "Files in both torrent and external IA: $(wc -l < /tmp/matching_files.txt)"
            
            echo "Fetching MD5 checksums from external IA..."
            curl -sL "https://archive.org/metadata/$EXTERNAL_IA_IDS?output=json" > /tmp/ia_metadata.json
            python3 -c "import json; [print(f.get('name','')+'\t'+f.get('md5','')) for f in json.load(open('/tmp/ia_metadata.json')).get('files',[]) if f.get('name') and f.get('md5')]" > /tmp/external_md5.txt || true
            echo "External IA MD5s: $(wc -l < /tmp/external_md5.txt)"
            
            mv /tmp/matching_files.txt /tmp/torrent_files.txt
            TOTAL_FILES=$(wc -l < /tmp/torrent_files.txt)
          fi

          if [ "$END" -eq 0 ] || [ "$END" -gt "$TOTAL_FILES" ]; then
            END=$TOTAL_FILES
          fi

          process_file() {
            local i=$1
            local path
            path=$(sed -n "${i}p" /tmp/torrent_files.txt)

            if [ -z "$path" ]; then
              echo "File $i: SKIP (no path)"
              return
            fi

            if grep -qx "^${path}$" /tmp/ia_files.txt; then
              echo "File $i: SKIP (exists in target IA)"
              return
            fi

            if [ "$COPY_MODE" = "true" ]; then
              echo "File $i: Copying from external IA: $path"
              ia copy "$EXTERNAL_IA_IDS/${path}" "$IA_ID/${path}" --no-derive
              echo "File $i: Done (copied)"
              return
            fi

            if grep -qx "^${path}$" /tmp/external_ia_files.txt; then
              echo "File $i: SKIP (exists in external IA)"
              return
            fi

            mkdir -p "workdir_$i"
            aria2c --quiet --dir="workdir_$i" --select-file="$i" --seed-time=0 --bt-stop-timeout=300 --bt-remove-unselected-file torrent.torrent >/dev/null 2>&1

            file=$(find "workdir_$i" -type f ! -name "*.torrent" ! -name "*.aria2" | head -1)
            if [ -n "$file" ] && [ -f "$file" ]; then
              echo "File $i: Uploading $(basename "$file")"
              ia upload "$IA_ID" "$file" --remote-name="$path" --no-derive --retries=3
            fi

            rm -rf "workdir_$i"
            echo "File $i: Done"
          }

          for i in $(seq "$START" "$END"); do
            process_file "$i"
          done

          echo "All done."
          SCRIPT
          chmod +x /tmp/upload.sh
          EXTERNAL_IA_IDS="${{ inputs.external_ia_ids }}" /tmp/upload.sh "${{ inputs.start_file }}" "${{ inputs.end_file }}" "${{ inputs.ia_identifier }}" "${{ inputs.copy_from_external }}" "${{ inputs.external_ia_ids }}"
