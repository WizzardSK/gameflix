name: Torrent to Archive.org

on:
  workflow_dispatch:
    inputs:
      torrent_url:
        description: 'URL of .torrent file to download'
        required: true
        default: 'https://archive.org/download/exodos-full/eXoDOS.torrent'
      ia_identifier:
        description: 'Internet Archive item identifier'
        required: true
        default: 'exodos-full'
      start_file:
        description: 'Start file index (1-based)'
        required: true
        default: '1'
      end_file:
        description: 'End file index (1-based, 0=all files)'
        required: true
        default: '0'

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          df -h /

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2
          pip install internetarchive

      - name: Configure Internet Archive
        run: |
          mkdir -p ~/.config/internetarchive
          cat > ~/.config/internetarchive/ia.ini << 'EOCONF'
          [s3]
          access = ${{ secrets.IA_ACCESS }}
          secret = ${{ secrets.IA_SECRET }}
          EOCONF
          sed -i 's/^          //' ~/.config/internetarchive/ia.ini

      - name: Download torrent file
        run: |
          curl -L -o torrent.torrent "${{ inputs.torrent_url }}"
          aria2c --show-files torrent.torrent | head -20

      - name: Download and upload files one by one
        run: |
          START=${{ inputs.start_file }}
          END=${{ inputs.end_file }}
          IA_ID="${{ inputs.ia_identifier }}"

          # Count total files in torrent
          TOTAL_FILES=$(aria2c --show-files torrent.torrent | grep -E "^\s*[0-9]+\|" | wc -l)
          echo "Total files in torrent: $TOTAL_FILES"

          # If END is 0 or very high (e.g. 9999), use total files
          if [ "$END" -eq 0 ] || [ "$END" -gt "$TOTAL_FILES" ]; then
            echo "Setting END to total files: $TOTAL_FILES"
            END=$TOTAL_FILES
          fi

          echo "Processing files $START to $END"

          for i in $(seq $START $END); do
            echo "=========================================="
            echo "Processing file index: $i"
            echo "=========================================="

            # Get file path from torrent info (first line with index)
            REMOTE_PATH=$(aria2c --show-files torrent.torrent | sed -n "/^\s*${i}|/p" | sed "s/^\s*${i}|//" | sed 's/|.*//')

            if [ -z "$REMOTE_PATH" ]; then
              echo "WARNING: Could not determine path for index $i, skipping"
              continue
            fi

            # Strip leading ./
            REMOTE_PATH="${REMOTE_PATH#./}"
            echo "Remote path: $REMOTE_PATH"

            # Check if file already exists on Archive.org
            if ia list "$IA_ID" 2>/dev/null | grep -q "^${REMOTE_PATH}$"; then
              echo "SKIP: File already exists on Archive.org: $REMOTE_PATH"
              continue
            fi

            # Clear workdir before download
            rm -rf workdir
            mkdir -p workdir

            # Download single file with retry
            DOWNLOADED=""
            for attempt in 1 2 3; do
              if [ $attempt -gt 1 ]; then
                echo "Retry $attempt for file index $i"
                rm -rf workdir ~/.cache/aria2
                mkdir -p workdir
                sleep 5
              fi

              aria2c \
                --dir=workdir \
                --select-file=$i \
                --seed-time=0 \
                --bt-stop-timeout=600 \
                --max-overall-download-limit=0 \
                --file-allocation=none \
                --summary-interval=30 \
                --bt-remove-unselected-file \
                torrent.torrent && {
                  DOWNLOADED=$(find workdir -type f ! -name "*.torrent" ! -name "*.aria2" -print0 2>/dev/null | tr '\0' '\n' | head -1)
                  [ -n "$DOWNLOADED" ] && break
                }
            done

            if [ -z "$DOWNLOADED" ]; then
              echo "WARNING: Failed to download file $i after 3 attempts, skipping"
              rm -rf workdir
              continue
            fi

            echo "Downloaded: $DOWNLOADED"
            ls -lh -- "$DOWNLOADED"

            # Upload to Internet Archive
            echo "Uploading as: $REMOTE_PATH"

            ia upload "$IA_ID" "$DOWNLOADED" \
              --remote-name="$REMOTE_PATH" \
              --no-derive \
              --retries=5 || {
                echo "ERROR: Failed to upload file $i"
              }

            # Wipe entire workdir to free disk space
            rm -rf workdir

            echo "Disk space remaining:"
            df -h / | tail -1

            echo "File $i done."
          done

          echo "All files processed ($START to $END)."
