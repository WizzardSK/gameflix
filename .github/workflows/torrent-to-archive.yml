# Kompletný workflow `torrent-to-archive.yml`

```yaml
name: Torrent to Archive

on:
  workflow_dispatch:
    inputs:
      torrent_url:
        description: "Torrent URL"
        required: true
      archive_item:
        description: "Internet Archive item identifier"
        required: true
      start_file:
        description: "Start file index"
        required: true
        default: "1"
      end_file:
        description: "End file index"
        required: true
        default: "1"

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 jq python3-pip
          pip install internetarchive

      - name: Download torrent file
        run: |
          curl -L "${{ github.event.inputs.torrent_url }}" -o torrent.torrent

      - name: Show torrent file list
        run: |
          aria2c --show-files torrent.torrent

      - name: Download and upload selected files
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
          ARCHIVE_ITEM: ${{ github.event.inputs.archive_item }}
          START_FILE: ${{ github.event.inputs.start_file }}
          END_FILE: ${{ github.event.inputs.end_file }}
        run: |
          set -e

          for ((i=START_FILE; i<=END_FILE; i++)); do
            echo "Processing torrent file index $i"

            mkdir -p workdir
            cd workdir

            aria2c \
              --dir=. \
              --seed-time=0 \
              --summary-interval=0 \
              --bt-save-metadata=true \
              --bt-remove-unselected-file=true \
              --select-file="$i" \
              ../torrent.torrent

            DOWNLOADED=$(find . -type f \
              ! -name "*.torrent" \
              ! -name "*.aria2" \
              ! -path "*/.git/*" \
              2>/dev/null | head -n1)

            if [ -z "$DOWNLOADED" ]; then
              echo "No downloaded file found for index $i"
              cd ..
              rm -rf workdir
              continue
            fi

            echo "Downloaded: $DOWNLOADED"
            ls -lh "$DOWNLOADED"

            REMOTE_PATH="${DOWNLOADED#./}"

            echo "Uploading to Internet Archive path: $REMOTE_PATH"

            ia upload "$ARCHIVE_ITEM" "$DOWNLOADED" \
              --remote-name="$REMOTE_PATH"

            echo "Removing uploaded file"
            rm -f "$DOWNLOADED"

            find . -type d -empty -delete

            cd ..
            rm -rf workdir
          done

      - name: Cleanup
        run: |
          rm -f torrent.torrent
          find . -type d -empty -delete
```
