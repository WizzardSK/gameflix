name: TDC DAT Import

on:
  workflow_dispatch:
    inputs:
      source_ia_id:
        description: 'Source IA identifier to copy from'
        required: true
        default: 'Total_DOS_Collection_Release_16_March_2019'
      target_ia_id:
        description: 'Target IA identifier'
        required: true
        default: 'total_dos_collection'
      batch_size:
        description: 'Files per batch (0=all)'
        required: false
        default: '100'

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 600

    steps:
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq p7zip-full jq curl
          pip install internetarchive --break-system-packages

      - name: Configure IA
        run: |
          mkdir -p ~/.config/internetarchive
          cat > ~/.config/internetarchive/ia.ini << EOCONF
          [s3]
          access = ${{ secrets.IA_ACCESS }}
          secret = ${{ secrets.IA_SECRET }}
          EOCONF
          chmod 600 ~/.config/internetarchive/ia.ini

      - name: Get source IA files
        env:
          SOURCE_IA: ${{ inputs.source_ia_id }}
        run: |
          echo "Fetching files from $SOURCE_IA..."
          curl -sL "https://archive.org/metadata/${SOURCE_IA}?output=json" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for f in data.get('files', []):
              name = f.get('name', '')
              size = f.get('size', '')
              if name and (name.endswith('.zip') or name.endswith('.z01') or name.endswith('.z02')):
                  print(name + '\t' + size, file=sys.stderr)
                  print(name)
          " > /tmp/ia_source_files.txt
          echo "Files found: $(wc -l < /tmp/ia_source_files.txt)"

      - name: Get target IA files
        env:
          TARGET_IA: ${{ inputs.target_ia_id }}
        run: |
          echo "Fetching target files..."
          curl -sL "https://archive.org/metadata/${TARGET_IA}?output=json" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for f in data.get('files', []):
              name = f.get('name', '')
              print(name)
          " > /tmp/ia_target_files.txt
          echo "Target files: $(wc -l < /tmp/ia_target_files.txt)"

      - name: Copy files
        env:
          SOURCE_IA: ${{ inputs.source_ia_id }}
          TARGET_IA: ${{ inputs.target_ia_id }}
          BATCH_SIZE: ${{ inputs.batch_size }}
        run: |
          echo "Starting copy..."
          echo "BATCH: $BATCH_SIZE"
          
          python3 << 'PYEOF'
          import os
          import sys
          import subprocess

          BATCH_SIZE = int(os.environ.get('BATCH_SIZE', '100'))
          SOURCE_IA = os.environ.get('SOURCE_IA')
          TARGET_IA = os.environ.get('TARGET_IA')

          target_files = set()
          with open('/tmp/ia_target_files.txt') as f:
              for line in f:
                  line = line.strip()
                  if line:
                      target_files.add(line)

          print(f"Target has {len(target_files)} existing files")

          source_files = []
          with open('/tmp/ia_source_files.txt') as f:
              for line in f:
                  line = line.strip()
                  if line:
                      source_files.append(line)

          print(f"Source has {len(source_files)} files")

          to_copy = [f for f in source_files if f not in target_files]
          print(f"Need to copy: {len(to_copy)} files")

          if BATCH_SIZE == 0:
              BATCH_SIZE = len(to_copy)

          print(f"Copying batch of {BATCH_SIZE}...")

          copied = 0
          for ia_file in to_copy[:BATCH_SIZE]:
              print(f"Copying: {ia_file}")
              result = subprocess.run([
                  'ia', 'copy',
                  f'{SOURCE_IA}/{ia_file}',
                  f'{TARGET_IA}/{ia_file}',
                  '--no-derive', '--no-backup'
              ], capture_output=True, text=True)
              if result.returncode == 0:
                  copied += 1
                  print(f"OK: {ia_file}")
              else:
                  err = (result.stderr or result.stdout)[:200]
                  print(f"FAIL: {ia_file} - {err}")

          print(f"Copied {copied} files")
          if copied == 0:
              print("No files copied - checking error above")
          PYEOF