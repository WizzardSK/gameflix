name: TDC Import

on:
  workflow_dispatch:
    inputs:
      dat_url:
        description: 'DAT file URL'
        required: true
        default: 'http://www.totaldoscollection.org/nugnugnug/TDC_DAT_release_23.zip'
      source_ia:
        description: 'Source IA identifier'
        required: true
        default: 'Total_DOS_Collection_Release_16_March_2019'
      target_ia:
        description: 'Target IA identifier'
        required: true
        default: 'total_dos_collection'
      batch_size:
        description: 'Files to copy (0=all)'
        required: false
        default: '0'

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 600
    
    steps:
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq p7zip-full curl
          pip install internetarchive --break-system-packages

      - name: Configure IA
        run: |
          mkdir -p ~/.config/internetarchive
          cat > ~/.config/internetarchive/ia.ini << 'EOCONF'
          [s3]
          access = ${{ secrets.IA_ACCESS }}
          secret = ${{ secrets.IA_SECRET }}
          EOCONF

      - name: Download and parse DAT
        run: |
          DAT_URL="${{ github.event.inputs.dat_url }}"
          echo "Downloading DAT: $DAT_URL"
          curl -sL -o /tmp/tdc_dat.zip "$DAT_URL"
          7z x -y /tmp/tdc_dat.zip -o/tmp/dat/ > /dev/null
          echo "DAT extracted"

      - name: Build game list
        run: |
          python3 << 'PYEOF'
          import re
          games = set()
          for f in __import__('os').listdir('/tmp/dat'):
              p = f'/tmp/dat/{f}'
              try:
                  with open(p, 'r', encoding='utf-8', errors='ignore') as fp:
                      c = fp.read()
                  names = re.findall(r'game\s*\(\s*name\s+"([^"]+)"', c)
                  for n in names:
                      games.add(n)
              except:
                  pass
          print(f"Games in DAT: {len(games)}")
          with open('/tmp/games.txt', 'w') as f:
              for g in sorted(games):
                  f.write(g + '\n')
          for g in list(games)[:3]:
              print(f"  {g[:40]}")
          PYEOF

      - name: Get source IA files
        run: |
          SOURCE="${{ github.event.inputs.source_ia }}"
          TARGET="${{ github.event.inputs.target_ia }}"
          echo "Getting source files..."
          curl -sL "https://archive.org/metadata/${SOURCE}?output=json" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for f in data.get('files', []):
              n = f.get('name', '')
              if n.endswith('.zip'):
                  print(n)
          " > /tmp/source.txt
          echo "Getting target files..."
          curl -sL "https://archive.org/metadata/${TARGET}?output=json" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for f in data.get('files', []):
              n = f.get('name', '')
              print(n)
          " > /tmp/target.txt
          echo "Source: $(wc -l < /tmp/source.txt), Target: $(wc -l < /tmp/target.txt)"

      - name: Match files
        run: |
          python3 << 'PYEOF'
          import re
          
          games = set()
          for line in open('/tmp/games.txt'):
              line = line.strip()
              if line:
                  games.add(line.replace('.zip', ''))
          
          target_files = set(open('/tmp/target.txt').read().splitlines())
          
          source_files = []
          for line in open('/tmp/source.txt'):
              line = line.strip()
              if line:
                  source_files.append(line)
          
          print(f"Games: {len(games)}, Source: {len(source_files)}, Target: {len(target_files)}")
          
          matched = []
          skip_existing = 0
          
          for ia_file in source_files:
              if ia_file in target_files or ia_file.replace('Games/', '') in target_files:
                  skip_existing += 1
                  continue
              base = ia_file.replace('.zip', '')
              game_base = base.replace('Games/', '')
              
              for g in games:
                  if g and (g in game_base or game_base in g or game_base[:20] in g):
                      matched.append(ia_file)
                      break
          
          print(f"Matched: {len(matched)}, Skipped: {skip_existing}")
          
          with open('/tmp/matched.txt', 'w') as f:
              for m in matched:
                  f.write(m + '\n')
          for m in matched[:10]:
              print(f"  {m[:60]}")
          PYEOF

      - name: Copy files
        env:
          BATCH: ${{ github.event.inputs.batch_size }}
          SOURCE: ${{ github.event.inputs.source_ia }}
          TARGET: ${{ github.event.inputs.target_ia }}
        run: |
          BATCH_NUM=$BATCH
          echo "=== Starting copy of $BATCH_NUM files ==="
          
          COPIED=0
          FAILED=0
          
          while IFS= read -r ia_file; do
            echo "Copying: $ia_file"
            if ia copy "${SOURCE}/${ia_file}" "${TARGET}/${ia_file}" --no-backup 2>&1 | grep -q "success"; then
              echo "  OK"
              COPIED=$((COPIED+1))
            else
              echo "  FAIL"
              FAILED=$((FAILED+1))
            fi
          done < <(head -n $BATCH_NUM /tmp/matched.txt)
          
          echo "======"
          echo "Copied: $COPIED files"
          echo "Failed: $FAILED files"