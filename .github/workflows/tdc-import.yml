name: TDC Import

on:
  workflow_dispatch:
    inputs:
      magnet_url:
        description: 'Magnet URL'
        required: true
        default: 'magnet:?xt=urn:btih:5D1B8E19C6C20B2E6107F0C4DFE631F86CE16C29&tr=http%3A%2F%2Fbt4.t-ru.org%2Fann%3Fmagnet'
      target_ia:
        description: 'Target IA identifier'
        required: true
        default: 'total_dos_collection'
      batch_size:
        description: 'Files to upload (0=all)'
        required: false
        default: '0'

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 600
    
    steps:
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 bc p7zip-full curl
          pip install internetarchive

      - name: Configure IA
        run: |
          mkdir -p ~/.config/internetarchive
          cat > ~/.config/internetarchive/ia.ini << 'EOCONF'
          [s3]
          access = ${{ secrets.IA_ACCESS }}
          secret = ${{ secrets.IA_SECRET }}
          EOCONF

      - name: Get target IA files
        run: |
          TARGET="${{ github.event.inputs.target_ia }}"
          echo "Getting target files..."
          curl -sL "https://archive.org/metadata/${TARGET}?output=json" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for f in data.get('files', []):
              n = f.get('name', '')
              print(n)
          " > /tmp/target.txt
          echo "Target: $(wc -l < /tmp/target.txt)"

      - name: Download from torrent
        run: |
          MAGNET="${{ github.event.inputs.magnet_url }}"
          TARGET="${{ github.event.inputs.target_ia }}"
          BATCH="${{ github.event.inputs.batch_size }}"
          
          mkdir -p /tmp/downloads
          chmod 777 /tmp/downloads
          
          aria2c --bt-seed-unverified=true --bt-max-peers=20 --max-concurrent-downloads=5 --dir=/tmp/downloads --file-allocation=none "$MAGNET" 2>&1 | tail -30
          
          echo "Downloaded files:"
          find /tmp/downloads -type f ! -name "*.torrent" ! -name "*.aria2" 2>/dev/null | wc -l
          ls -la /tmp/downloads/

      - name: Upload new files
        env:
          TARGET: ${{ github.event.inputs.target_ia }}
          BATCH: ${{ github.event.inputs.batch_size }}
        run: |
          TARGET="${{ github.event.inputs.target_ia }}"
          BATCH_NUM=${{ github.event.inputs.batch_size }}
          
          target_files=$(cat /tmp/target.txt)
          
          COPIED=0
          FAILED=0
          SKIPPED=0
          
          for f in /tmp/downloads/*; do
            [ -f "$f" ] || continue
            fname=$(basename "$f")
            
            if echo "$target_files" | grep -qx "$fname"; then
              echo "SKIP: $fname (exists)"
              SKIPPED=$((SKIPPED+1))
              continue
            fi
            
            echo "Uploading: $fname"
            if ia upload "$TARGET" "$f" --remote-name="$fname" --no-derive --no-backup --retries=3 2>&1 | grep -q "success"; then
              echo "  OK"
              COPIED=$((COPIED+1))
            else
              echo "  FAIL"
              FAILED=$((FAILED+1))
            fi
            
            if [ "$BATCH_NUM" != "0" ] && [ $COPIED -ge $BATCH_NUM ]; then
              break
            fi
          done
          
          echo "======"
          echo "Uploaded: $COPIED files"
          echo "Skipped: $SKIPPED files"
          echo "Failed: $FAILED files"