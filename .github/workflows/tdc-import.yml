name: TDC Import

on:
  workflow_dispatch:
    inputs:
      magnet_url:
        description: 'Magnet URL'
        required: true
        default: 'magnet:?xt=urn:btih:5D1B8E19C6C20B2E6107F0C4DFE631F86CE16C29&tr=http%3A%2F%2Fbt4.t-ru.org%2Fann%3Fmagnet'
      target_ia:
        description: 'Target IA identifier'
        required: true
        default: 'total_dos_collection'
      start_index:
        description: 'Start file index (1-based)'
        required: false
        default: '1'
      end_index:
        description: 'End file index (0=all)'
        required: false
        default: '0'

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 600
    
    steps:
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 bc p7zip-full curl
          pip install internetarchive

      - name: Configure IA
        run: |
          mkdir -p ~/.config/internetarchive
          cat > ~/.config/internetarchive/ia.ini << 'EOCONF'
          [s3]
          access = ${{ secrets.IA_ACCESS }}
          secret = ${{ secrets.IA_SECRET }}
          EOCONF

      - name: Get target IA files
        run: |
          TARGET="${{ github.event.inputs.target_ia }}"
          echo "Getting target files..."
          curl -sL "https://archive.org/metadata/${TARGET}?output=json" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for f in data.get('files', []):
              n = f.get('name', '')
              print(n)
          " > /tmp/target.txt
          echo "Target: $(wc -l < /tmp/target.txt)"

      - name: Get torrent file list
        run: |
          MAGNET="${{ github.event.inputs.magnet_url }}"
          mkdir -p /tmp/downloads
          chmod 777 /tmp/downloads
          
          aria2c --bt-seed-unverified=true --bt-max-peers=20 --max-concurrent-downloads=1 --dir=/tmp/downloads --file-allocation=none --bt-save-metadata=true "$MAGNET" 2>&1 | tail -10
          
          if [ -f /tmp/downloads/*.torrent ]; then
            aria2c --show-files /tmp/downloads/*.torrent > /tmp/torrent_files.txt
          else
            aria2c --show-files /tmp/downloads/*.torrent 2>/dev/null > /tmp/torrent_files.txt || true
          fi
          
          TOTAL=$(grep -cE "^\s*[0-9]+|" /tmp/torrent_files.txt || echo 0)
          echo "Total files in torrent: $TOTAL"

      - name: Download and upload files
        run: |
          MAGNET="${{ github.event.inputs.magnet_url }}"
          TARGET="${{ github.event.inputs.target_ia }}"
          START=${{ github.event.inputs.start_index || '1' }}
          END=${{ github.event.inputs.end_index || '0' }}
          
          cat > /tmp/process.sh << 'SCRIPT'
          #!/bin/bash
          START=$1
          END=$2
          
          TOTAL=$(grep -cE "^\s*[0-9]+|" /tmp/torrent_files.txt)
          if [ "$END" -eq 0 ] || [ "$END" -gt "$TOTAL" ]; then
            END=$TOTAL
          fi
          
          target_files=$(cat /tmp/target.txt)
          
          COPIED=0
          FAILED=0
          SKIPPED=0
          
          for i in $(seq "$START" "$END"); do
            path=$(sed -n "/^\s*${i}|/p" /tmp/torrent_files.txt | sed "s/^\s*${i}|//" | sed 's/|.*//' | sed 's/^\.\///')
            
            if echo "$target_files" | grep -qx "$path"; then
              echo "File $i: SKIP (exists in IA): $path"
              SKIPPED=$((SKIPPED+1))
              continue
            fi
            
            echo "File $i: Downloading: $path"
            rm -rf /tmp/downloads/*
            mkdir -p /tmp/work
            aria2c --bt-seed-unverified=true --bt-max-peers=20 --max-concurrent-downloads=1 --select-file="$i" --dir=/tmp/work --file-allocation=none /tmp/downloads/*.torrent 2>&1 | grep -v "^#"
            
            file=$(find /tmp/work -type f ! -name "*.torrent" ! -name "*.aria2" | head -1)
            if [ -n "$file" ] && [ -f "$file" ]; then
              fname=$(basename "$file")
              echo "File $i: Uploading: $fname"
              if ia upload "$TARGET" "$file" --remote-name="$path" --no-derive --no-backup --retries=3 2>&1 | grep -q "success"; then
                echo "File $i: OK"
                COPIED=$((COPIED+1))
              else
                echo "File $i: FAIL"
                FAILED=$((FAILED+1))
              fi
            else
              echo "File $i: FAIL (no file)"
              FAILED=$((FAILED+1))
            fi
            
            rm -rf /tmp/work
          done
          
          echo "======"
          echo "Uploaded: $COPIED"
          echo "Skipped: $SKIPPED"
          echo "Failed: $FAILED"
          SCRIPT
          chmod +x /tmp/process.sh
          /tmp/process.sh "$START" "$END"