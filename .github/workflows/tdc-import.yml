name: TDC Import

on:
  workflow_dispatch:
    inputs:
      dat_url:
        description: 'DAT file URL'
        required: true
        default: 'http://www.totaldoscollection.org/nugnugnug/TDC_DAT_release_23.zip'
      source_ia:
        description: 'Source IA identifier'
        required: true
        default: 'Total_DOS_Collection_Release_16_March_2019'
      target_ia:
        description: 'Target IA identifier'
        required: true
        default: 'total_dos_collection'
      batch_size:
        description: 'Files to copy (0=all)'
        required: false
        default: '0'

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 600
    
    steps:
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq p7zip-full curl
          pip install internetarchive --break-system-packages

      - name: Configure IA
        run: |
          mkdir -p ~/.config/internetarchive
          cat > ~/.config/internetarchive/ia.ini << 'EOCONF'
          [s3]
          access = ${{ secrets.IA_ACCESS }}
          secret = ${{ secrets.IA_SECRET }}
          EOCONF

      - name: Download and parse DAT
        run: |
          DAT_URL="${{ github.event.inputs.dat_url }}"
          echo "Downloading DAT: $DAT_URL"
          curl -sL -o /tmp/tdc_dat.zip "$DAT_URL"
          7z x -y /tmp/tdc_dat.zip -o/tmp/dat/ > /dev/null
          echo "DAT extracted"

      - name: Build game list with checksums
        run: |
          python3 << 'PYEOF'
          import re
          games = {}
          for f in __import__('os').listdir('/tmp/dat'):
              p = f'/tmp/dat/{f}'
              try:
                  with open(p, 'r', encoding='utf-8', errors='ignore') as fp:
                      c = fp.read()
                  g = re.findall(r'game\s*\(\s*name\s+"([^"]+)"', c)
                  for name in g:
                      games[name] = None
                  m = re.findall(r'game\s*\(\s*name\s+"([^"]+)"[^)]*\)\s*\(.*crc\s*([0-9a-fA-F]+)', c)
                  for name, crc in m:
                      if name in games:
                          games[name] = crc.lower()
                  m = re.findall(r'game\s*\(\s*name\s+"([^"]+)"[^)]*\)\s*\(.*md5\s*([0-9a-fA-F]+)', c)
                  for name, md5 in m:
                      if name in games:
                          games[name] = md5.lower()
              except:
                  pass
          print(f"Games in DAT: {len(games)}")
          with open('/tmp/games.txt', 'w') as f:
              for g in sorted(games.keys()):
                  f.write(g + '\n')
          with open('/tmp/checksums.txt', 'w') as f:
              for g, chk in sorted(games.items()):
                  f.write(f"{g}|{chk}\n")
          for g in list(games.keys())[:5]:
              print(f"  {g[:50]} => {games[g]}")
          PYEOF

      - name: Get source IA files
        run: |
          SOURCE="${{ github.event.inputs.source_ia }}"
          TARGET="${{ github.event.inputs.target_ia }}"
          echo "Getting source files..."
          curl -sL "https://archive.org/metadata/${SOURCE}?output=json" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for f in data.get('files', []):
              n = f.get('name', '')
              if n.endswith('.zip'):
                  print(n)
          " > /tmp/source.txt
          echo "Getting target files..."
          curl -sL "https://archive.org/metadata/${TARGET}?output=json" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for f in data.get('files', []):
              n = f.get('name', '')
              print(n)
          " > /tmp/target.txt
          echo "Source: $(wc -l < /tmp/source.txt), Target: $(wc -l < /tmp/target.txt)"

      - name: Match files with checksum
        run: |
          python3 << 'PYEOF'
          import json
          import urllib.request
          
          games = {}
          with open('/tmp/checksums.txt') as f:
              for l in f:
                  l = l.strip()
                  if '|' in l:
                      name, chk = l.split('|', 1)
                      games[name] = chk
          
          target_files = set()
          with open('/tmp/target.txt') as f:
              for l in f:
                  l = l.strip()
                  if l:
                      target_files.add(l)
          
          files = []
          with open('/tmp/source.txt') as f:
              for l in f:
                  l = l.strip()
                  if l:
                      files.append(l)
          
          TARGET = "${{ github.event.inputs.target_ia }}"
          target_meta = json.loads(urllib.request.urlopen(f"https://archive.org/metadata/{TARGET}").read())
          target_checksums = {}
          for f in target_meta.get('files', []):
              name = f.get('name', '')
              md5 = f.get('md5', '')
              if name and md5:
                  target_checksums[name] = md5.lower()
          
          matched = []
          skipped = 0
          for ia_file in files:
              base = ia_file.replace('.zip', '').replace('Games/', '')
              for g in games:
                  if g in base or base in g[:25]:
                      matched.append((ia_file, games[g]))
                      break
          
          verified = []
          for ia_file, dat_chk in matched:
              if ia_file in target_files:
                  skipped += 1
                  continue
              if ia_file in target_checksums:
                  if dat_chk and dat_chk == target_checksums[ia_file]:
                      verified.append(ia_file)
                  else:
                      skipped += 1
              else:
                  verified.append(ia_file)
          
          print(f"Matched: {len(matched)}, Verified: {len(verified)}, Skipped: {skipped}")
          with open('/tmp/matched.txt', 'w') as f:
              for m in verified:
                  f.write(m + '\n')
          PYEOF

      - name: Copy files
        env:
          BATCH: ${{ github.event.inputs.batch_size }}
          SOURCE: ${{ github.event.inputs.source_ia }}
          TARGET: ${{ github.event.inputs.target_ia }}
        run: |
          BATCH_NUM=$BATCH
          echo "=== Starting copy of $BATCH_NUM files ==="
          
          COPIED=0
          FAILED=0
          
          while IFS= read -r ia_file; do
            echo "Copying: $ia_file"
            if ia copy "${SOURCE}/${ia_file}" "${TARGET}/${ia_file}" --no-backup 2>&1 | grep -q "success"; then
              echo "  OK"
              COPIED=$((COPIED+1))
            else
              echo "  FAIL"
              FAILED=$((FAILED+1))
            fi
          done < <(head -n $BATCH_NUM /tmp/matched.txt)
          
          echo "======"
          echo "Copied: $COPIED files"
          echo "Failed: $FAILED files"