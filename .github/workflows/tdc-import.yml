name: TDC Import

on:
  workflow_dispatch:
    inputs:
      torrent_url:
        description: 'URL of .torrent file'
        required: true
        default: 'https://archive.org/download/total_dos_collection/TDC23.torrent'
      target_ia:
        description: 'Target IA identifier'
        required: true
        default: 'total_dos_collection'
      external_ia_id:
        description: 'External IA identifier to copy from'
        required: false
        default: ''
      start_index:
        description: 'Start file index (1-based)'
        required: false
        default: '1'
      end_index:
        description: 'End file index (0=all)'
        required: false
        default: '0'
  schedule:
    - cron: '0 */6 * * *'

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 600
    
    steps:
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 bc p7zip-full curl
          pip install internetarchive

      - name: Configure IA
        run: |
          mkdir -p ~/.config/internetarchive
          cat > ~/.config/internetarchive/ia.ini << 'EOCONF'
          [s3]
          access = ${{ secrets.IA_ACCESS }}
          secret = ${{ secrets.IA_SECRET }}
          EOCONF

      - name: Get target IA files
        run: |
          TARGET="${{ github.event.inputs.target_ia || 'total_dos_collection' }}"
          echo "Getting target files..."
          curl -sL "https://archive.org/metadata/${TARGET}?output=json" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for f in data.get('files', []):
              n = f.get('name', '')
              print(n)
          " > /tmp/target.txt
          echo "Target: $(wc -l < /tmp/target.txt)"

      - name: Get torrent file list
        run: |
          TORRENT_URL="${{ github.event.inputs.torrent_url || 'https://archive.org/download/total_dos_collection/TDC23.torrent' }}"
          echo "Downloading torrent from: $TORRENT_URL"
          curl -sL -o /tmp/torrent.torrent "$TORRENT_URL"
          
          echo "Torrent file size: $(stat -c%s /tmp/torrent.torrent) bytes"
          
          aria2c --show-files /tmp/torrent.torrent 2>/dev/null > /tmp/torrent_files.txt

          echo "Torrent files preview:"
          head -20 /tmp/torrent_files.txt

          # Build clean index: idx<TAB>path<TAB>size_bytes
          awk '
            /^[[:space:]]*[0-9]+\|/ {
              line = $0
              sub(/^[[:space:]]*/, "", line)
              p = index(line, "|")
              idx = substr(line, 1, p - 1)
              path = substr(line, p + 1)
              sub(/^\.\//, "", path)
              if ((getline next_line) > 0 && match(next_line, /\([0-9,]+\)/)) {
                size = substr(next_line, RSTART + 1, RLENGTH - 2)
                gsub(/,/, "", size)
              } else {
                size = ""
              }
              print idx "\t" path "\t" size
            }
          ' /tmp/torrent_files.txt > /tmp/files_index.txt

          TOTAL=$(wc -l < /tmp/files_index.txt)
          echo "Total files in torrent: $TOTAL"

      - name: Download and upload files
        run: |
          TORRENT_URL="${{ github.event.inputs.torrent_url || 'https://archive.org/download/total_dos_collection/TDC23.torrent' }}"
          TARGET="${{ github.event.inputs.target_ia || 'total_dos_collection' }}"
          EXTERNAL_IA="${{ github.event.inputs.external_ia_id || '' }}"
          START=${{ github.event.inputs.start_index || '1' }}
          END=${{ github.event.inputs.end_index || '0' }}
          
          TOTAL=$(wc -l < /tmp/files_index.txt)
          if [ "$END" -eq 0 ] || [ "$END" -gt "$TOTAL" ]; then
            END=$TOTAL
          fi

          if [ -n "$EXTERNAL_IA" ]; then
            echo "Fetching external IA metadata..."
            curl -sL "https://archive.org/metadata/${EXTERNAL_IA}?output=json" > /tmp/external_meta.json
            python3 -c "
            import json
            with open('/tmp/external_meta.json') as f:
                data = json.load(f)
            for f in data.get('files', []):
                name = f.get('name', '')
                size = f.get('size', '')
                mtime = f.get('mtime', '')
                if name and size:
                    print(name + '\t' + size + '\t' + mtime)
            " > /tmp/external_files.txt
            echo "External IA files: $(wc -l < /tmp/external_files.txt)"
          fi

          COPIED=0
          FAILED=0
          SKIPPED=0

          for i in $(seq "$START" "$END"); do
            path=""
            size=""
            IFS=$'\t' read -r _idx path size < <(awk -F'\t' -v idx="$i" '$1 == idx { print; exit }' /tmp/files_index.txt) || true

            if [ -z "$path" ]; then
              echo "File $i: FAIL (not in torrent index)"
              FAILED=$((FAILED+1))
              continue
            fi

            if grep -Fxq "$path" /tmp/target.txt; then
              echo "File $i: SKIP (exists in IA, snapshot): $path"
              SKIPPED=$((SKIPPED+1))
              continue
            fi

            # Live re-check on archive.org — catches files uploaded by a parallel
            # workflow run since /tmp/target.txt was snapshotted. HEAD only.
            encoded=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.stdin.read().rstrip(),safe='/'))" <<< "$path")
            http_code=$(curl -sI -o /dev/null -w '%{http_code}' --max-time 15 "https://archive.org/download/${TARGET}/${encoded}")
            if [ "$http_code" = "200" ]; then
              echo "File $i: SKIP (exists in IA, live check): $path"
              SKIPPED=$((SKIPPED+1))
              continue
            fi

            if [ -n "$EXTERNAL_IA" ] && [ -n "$size" ]; then
              ext_match=$(awk -F'\t' -v p="$path" -v s="$size" '$1 == p && $2 == s { print; exit }' /tmp/external_files.txt)
              if [ -n "$ext_match" ]; then
                echo "File $i: Copying from external IA: $path"
                if ia copy "$EXTERNAL_IA/${path}" "$TARGET/${path}" --no-derive --no-backup; then
                  echo "File $i: OK (copied)"
                  COPIED=$((COPIED+1))
                else
                  echo "File $i: FAIL (copy, ia exit $?)"
                  FAILED=$((FAILED+1))
                fi
                continue
              fi
            fi

            echo "File $i: Downloading: $path ($size bytes)"
            rm -rf /tmp/work
            mkdir -p /tmp/work
            aria2c --dir=/tmp/work --select-file="$i" --seed-time=0 --bt-stop-timeout=300 --bt-remove-unselected-file=true /tmp/torrent.torrent 2>&1 | { grep -v "^#" || true; }

            file="/tmp/work/${path}"
            if [ -f "$file" ] && [ -s "$file" ]; then
              echo "File $i: Uploading: $path"
              ia upload "$TARGET" "$file" --remote-name="$path" --no-derive --no-backup --retries=3 2>&1 | tee /tmp/upload_log.txt
              ia_rc=${PIPESTATUS[0]}
              if [ "$ia_rc" -eq 0 ]; then
                echo "File $i: OK"
                COPIED=$((COPIED+1))
              else
                echo "File $i: FAIL (ia exit $ia_rc) - log: $(head -3 /tmp/upload_log.txt)"
                FAILED=$((FAILED+1))
              fi
            else
              echo "File $i: FAIL (file missing or empty at $file)"
              FAILED=$((FAILED+1))
            fi

            rm -rf /tmp/work
          done
          
          echo "======"
          echo "Uploaded: $COPIED"
          echo "Skipped: $SKIPPED"
          echo "Failed: $FAILED"