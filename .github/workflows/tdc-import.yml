name: TDC Import

on:
  workflow_dispatch:
    inputs:
      dat_url:
        description: 'DAT file URL'
        required: true
        default: 'http://www.totaldoscollection.org/nugnugnug/TDC_DAT_release_23.zip'
      source_ia:
        description: 'Source IA identifier'
        required: true
        default: 'Total_DOS_Collection_Release_16_March_2019'
      target_ia:
        description: 'Target IA identifier'
        required: true
        default: 'total_dos_collection'
      batch_size:
        description: 'Files to copy (0=all)'
        required: false
        default: '0'

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 600
    
    steps:
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq p7zip-full curl
          pip install internetarchive --break-system-packages

      - name: Configure IA
        run: |
          mkdir -p ~/.config/internetarchive
          cat > ~/.config/internetarchive/ia.ini << 'EOCONF'
          [s3]
          access = ${{ secrets.IA_ACCESS }}
          secret = ${{ secrets.IA_SECRET }}
          EOCONF

      - name: Download and parse DAT
        run: |
          DAT_URL="${{ github.event.inputs.dat_url }}"
          echo "Downloading DAT: $DAT_URL"
          curl -sL -o /tmp/tdc_dat.zip "$DAT_URL"
          7z x -y /tmp/tdc_dat.zip -o/tmp/dat/ > /dev/null
          echo "DAT extracted"

      - name: Build game list with CRC
        run: |
          python3 << 'PYEOF'
          import re
          games = {}
          for f in __import__('os').listdir('/tmp/dat'):
              p = f'/tmp/dat/{f}'
              try:
                  with open(p, 'r', encoding='utf-8', errors='ignore') as fp:
                      c = fp.read()
                  for m in re.finditer(r'game\s*\(\s*name\s+"([^"]+)"[^)]*file\s*\([^)]*crc\s*([0-9a-fA-F]+)', c):
                      name = m.group(1)
                      crc = m.group(2).lower()
                      games[name] = crc
                  names = re.findall(r'game\s*\(\s*name\s+"([^"]+)"', c)
                  for n in names:
                      if n not in games:
                          games[n] = None
              except:
                  pass
          print(f"Games in DAT: {len(games)}")
          with open('/tmp/games.txt', 'w') as f:
              for g in sorted(games.keys()):
                  f.write(f"{g}|{games[g] or ''}\n")
          for g in list(games.keys())[:3]:
              print(f"  {g[:40]} CRC:{games[g]}")
          PYEOF

      - name: Get source IA files with checksums
        run: |
          SOURCE="${{ github.event.inputs.source_ia }}"
          TARGET="${{ github.event.inputs.target_ia }}"
          echo "Getting source files with checksums..."
          curl -sL "https://archive.org/metadata/${SOURCE}?output=json" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for f in data.get('files', []):
              n = f.get('name', '')
              if n.endswith('.zip'):
                  crc = f.get('crc32', '')
                  print(n + '|' + (crc or ''))
          " > /tmp/source.txt
          echo "Getting target files..."
          curl -sL "https://archive.org/metadata/${TARGET}?output=json" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for f in data.get('files', []):
              n = f.get('name', '')
              print(n)
          " > /tmp/target.txt
          echo "Source: $(wc -l < /tmp/source.txt), Target: $(wc -l < /tmp/target.txt)"

      - name: Match files with CRC verification
        run: |
          python3 << 'PYEOF'
          games = {}
          with open('/tmp/games.txt') as f:
              for l in f:
                  l = l.strip()
                  if l and '|' in l:
                      name, crc = l.split('|', 1)
                      games[name.strip()] = crc.strip().lower() if crc.strip() else None
          
          target_files = set()
          with open('/tmp/target.txt') as f:
              for l in f:
                  l = l.strip()
                  if l:
                      target_files.add(l)
          
          source_files = {}
          with open('/tmp/source.txt') as f:
              for l in f:
                  l = l.strip()
                  if l and '|' in l:
                      parts = l.rsplit('|', 1)
                      source_files[parts[0]] = parts[1].lower() if len(parts) > 1 and parts[1] else None
          
          matched = []
          skip_existing = 0
          skip_checksum = 0
          
          for ia_file, source_crc in source_files.items():
              if ia_file in target_files:
                  skip_existing += 1
                  continue
              base = ia_file.replace('.zip', '').replace('Games/', '')
              dat_crc = None
              for g in games:
                  if g in base or base in g[:25]:
                      dat_crc = games.get(g)
                      break
              if dat_crc:
                  if source_crc and source_crc.lower() == dat_crc.lower():
                      matched.append(ia_file)
                  else:
                      skip_checksum += 1
              else:
                  matched.append(ia_file)
          
          print(f"Matched: {len(matched)}, Skipped existing: {skip_existing}, Skipped mismatch: {skip_checksum}")
          
          with open('/tmp/matched.txt', 'w') as f:
              for m in matched:
                  f.write(m + '\n')
          for m in matched[:5]:
              print(f"  {m[:60]}")
          PYEOF

      - name: Copy files
        env:
          BATCH: ${{ github.event.inputs.batch_size }}
          SOURCE: ${{ github.event.inputs.source_ia }}
          TARGET: ${{ github.event.inputs.target_ia }}
        run: |
          BATCH_NUM=$BATCH
          echo "=== Starting copy of $BATCH_NUM files ==="
          
          COPIED=0
          FAILED=0
          
          while IFS= read -r ia_file; do
            echo "Copying: $ia_file"
            if ia copy "${SOURCE}/${ia_file}" "${TARGET}/${ia_file}" --no-backup 2>&1 | grep -q "success"; then
              echo "  OK"
              COPIED=$((COPIED+1))
            else
              echo "  FAIL"
              FAILED=$((FAILED+1))
            fi
          done < <(head -n $BATCH_NUM /tmp/matched.txt)
          
          echo "======"
          echo "Copied: $COPIED files"
          echo "Failed: $FAILED files"