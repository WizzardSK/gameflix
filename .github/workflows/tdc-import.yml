name: TDC Import

on:
  workflow_dispatch:
    inputs:
      torrent_url:
        description: 'URL of .torrent file'
        required: true
        default: 'https://archive.org/download/total_dos_collection/TDC23.torrent'
      target_ia:
        description: 'Target IA identifier'
        required: true
        default: 'total_dos_collection'
      external_ia_id:
        description: 'External IA identifier to copy from'
        required: false
        default: ''
      start_index:
        description: 'Start file index (1-based)'
        required: false
        default: '1'
      end_index:
        description: 'End file index (0=all)'
        required: false
        default: '0'
  schedule:
    - cron: '0 */6 * * *'

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 600
    
    steps:
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 bc p7zip-full curl
          pip install internetarchive

      - name: Configure IA
        run: |
          mkdir -p ~/.config/internetarchive
          cat > ~/.config/internetarchive/ia.ini << 'EOCONF'
          [s3]
          access = ${{ secrets.IA_ACCESS }}
          secret = ${{ secrets.IA_SECRET }}
          EOCONF

      - name: Get target IA files
        run: |
          TARGET="${{ github.event.inputs.target_ia }}"
          echo "Getting target files..."
          curl -sL "https://archive.org/metadata/${TARGET}?output=json" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for f in data.get('files', []):
              n = f.get('name', '')
              print(n)
          " > /tmp/target.txt
          echo "Target: $(wc -l < /tmp/target.txt)"

      - name: Get torrent file list
        run: |
          TORRENT_URL="${{ github.event.inputs.torrent_url }}"
          echo "Downloading torrent from: $TORRENT_URL"
          curl -sL -o /tmp/torrent.torrent "$TORRENT_URL"
          
          echo "Torrent file size: $(stat -c%s /tmp/torrent.torrent) bytes"
          
          aria2c --show-files /tmp/torrent.torrent 2>/dev/null > /tmp/torrent_files.txt
          
          echo "Torrent files preview:"
          head -20 /tmp/torrent_files.txt
          
          TOTAL=$(grep -cE "^\s*[0-9]+|" /tmp/torrent_files.txt || echo 0)
          echo "Total files in torrent: $TOTAL"

      - name: Download and upload files
        run: |
          TORRENT_URL="${{ github.event.inputs.torrent_url }}"
          TARGET="${{ github.event.inputs.target_ia }}"
          EXTERNAL_IA="${{ github.event.inputs.external_ia_id || '' }}"
          START=${{ github.event.inputs.start_index || '1' }}
          END=${{ github.event.inputs.end_index || '0' }}
          
          TOTAL=$(grep -cE "^\s*[0-9]+|" /tmp/torrent_files.txt)
          if [ "$END" -eq 0 ] || [ "$END" -gt "$TOTAL" ]; then
            END=$TOTAL
          fi
          
          target_files=$(cat /tmp/target.txt)
          
          if [ -n "$EXTERNAL_IA" ]; then
            echo "Fetching external IA metadata..."
            curl -sL "https://archive.org/metadata/${EXTERNAL_IA}?output=json" > /tmp/external_meta.json
            python3 -c "
            import json
            with open('/tmp/external_meta.json') as f:
                data = json.load(f)
            for f in data.get('files', []):
                name = f.get('name', '')
                size = f.get('size', '')
                mtime = f.get('mtime', '')
                if name and size:
                    print(name + '\t' + size + '\t' + mtime)
            " > /tmp/external_files.txt
            echo "External IA files: $(wc -l < /tmp/external_files.txt)"
          fi
          
          COPIED=0
          FAILED=0
          SKIPPED=0
          
          for i in $(seq "$START" "$END"); do
            path=$(sed -n "/^\s*${i}|/p" /tmp/torrent_files.txt | sed "s/^\s*${i}|//" | sed 's/|.*//' | sed 's/^\.\///')
            size=$(sed -n "/^\s*${i}|/p" /tmp/torrent_files.txt | sed 's/.*|//' | tr -d ' ')
            
            if echo "$target_files" | grep -qx "$path"; then
              echo "File $i: SKIP (exists in IA): $path"
              SKIPPED=$((SKIPPED+1))
              continue
            fi
            
            if [ -n "$EXTERNAL_IA" ]; then
              ext_match=$(grep -F "${path}" /tmp/external_files.txt | grep -w "${size}")
              if [ -n "$ext_match" ]; then
                echo "File $i: Copying from external IA: $path"
                if ia copy "$EXTERNAL_IA/${path}" "$TARGET/${path}" --no-derive --no-backup 2>&1 | grep -q "success\|copied"; then
                  echo "File $i: OK (copied)"
                  COPIED=$((COPIED+1))
                else
                  echo "File $i: FAIL (copy)"
                  FAILED=$((FAILED+1))
                fi
                continue
              fi
            fi
            
            echo "File $i: Downloading: $path"
            rm -rf /tmp/work/*
            mkdir -p /tmp/work
            aria2c --dir=/tmp/work --select-file="$i" --seed-time=0 --bt-stop-timeout=300 /tmp/torrent.torrent 2>&1 | grep -v "^#"
            
            file=$(find /tmp/work -type f ! -name "*.torrent" ! -name "*.aria2" | head -1)
            if [ -n "$file" ] && [ -f "$file" ]; then
              fname=$(basename "$file")
              echo "File $i: Uploading: $fname"
              ia upload $TARGET "$file" --remote-name="$path" --no-derive --no-backup --retries=3 2>&1 | tee /tmp/upload_log.txt
              if grep -q "success\|uploaded\|completed" /tmp/upload_log.txt; then
                echo "File $i: OK"
                COPIED=$((COPIED+1))
              else
                echo "File $i: FAIL - check log: $(cat /tmp/upload_log.txt | head -3)"
                FAILED=$((FAILED+1))
              fi
            else
              echo "File $i: FAIL (no file)"
              FAILED=$((FAILED+1))
            fi
            
            rm -rf /tmp/work
          done
          
          echo "======"
          echo "Uploaded: $COPIED"
          echo "Skipped: $SKIPPED"
          echo "Failed: $FAILED"