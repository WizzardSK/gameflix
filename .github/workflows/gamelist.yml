name: Gamelists updater

on:
  workflow_dispatch:
  schedule:
    # Every Sunday at 02:00 UTC (mirror wizzardsk.github.io runs after, at 06:00)
    - cron: '0 2 * * 0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run script
        run: bash gamelist.sh
