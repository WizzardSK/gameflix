  <text x="200" y="72" text-anchor="middle" fill="url(#viigrad)" font-family="'Helvetica Neue','Arial',sans-serif" font-size="60" font-weight="100" letter-spacing="10">Vii</text>
  <!-- Decorative dots like Wii -->
  <circle cx="230" cy="22" r="4" fill="#00aaff"/>
  <circle cx="248" cy="22" r="4" fill="#00aaff"/>
